syntax = "proto3";
package store.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

service StoreService {
  rpc querydb(QueryRequest) returns (stream QueryResponse);
  rpc getconfig(google.protobuf.Empty) returns (ConfigResponse);
  rpc gettreemap(TreemapRequest) returns (TreemapResponse);
}

enum MethodEnum {
  UNSPECIFIED = 0;
  DEFAULT = 1;
  FD = 2;
  FZF = 3;
}

message QueryRequest {
  MethodEnum method = 1;
  string pattern = 2;
  google.protobuf.Timestamp timestamp = 3;
}

message FileInfo {
  string name = 1;
  string path = 2;
  int64 size = 3;
  google.protobuf.Timestamp modified = 4;
}

message QueryResponse {
  string id = 1;
  string name = 2;
  double price = 3;
  google.protobuf.Timestamp timestamp = 4;
  repeated FileInfo files = 5;
}

message ConfigResponse {
  string version = 1;
  string exclude = 2;
  google.protobuf.Timestamp last_indexed = 3;
  int64 total_files = 4;
  bool indexing = 5;
  bool monitoring = 6;
}

enum TreemapNodeType {
  TREEMAP_NODE_TYPE_UNSPECIFIED = 0;
  FILE = 1;
  DIRECTORY = 2;
}

message TreemapRequest {
  string root_path = 1;
  uint32 depth = 2;
}

message TreemapNode {
  string path = 1;
  string name = 2;
  TreemapNodeType type = 3;
  int64 size = 4;
  bool has_children = 5;
  repeated TreemapNode children = 6;
}

message TreemapResponse {
  TreemapNode root = 1;
}
